<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620" role="img" aria-labelledby="title desc">
  <title id="title">Nexus Scholar workflow map</title>
  <desc id="desc">A system map showing Nexus Scholar Core connected to CLI, web, graph packages, reference management, and research evidence.</desc>
  <rect width="960" height="620" fill="#fbfaf6"/>
  <g fill="none" stroke="#d7d1c4" stroke-width="2">
    <path d="M480 190 L220 330"/>
    <path d="M480 190 L740 330"/>
    <path d="M480 190 L480 395"/>
    <path d="M480 190 L300 115"/>
    <path d="M480 190 L660 115"/>
    <path d="M220 330 L480 500"/>
    <path d="M740 330 L480 500"/>
    <path d="M480 395 L480 500"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="350" y="140" width="260" height="96" rx="8" fill="#1f6f5b"/>
    <text x="480" y="178" fill="#ffffff" text-anchor="middle" font-size="24" font-weight="700">Nexus Scholar Core</text>
    <text x="480" y="207" fill="#e8f4ef" text-anchor="middle" font-size="15">workflow engine and package boundary</text>

    <rect x="70" y="288" width="300" height="88" rx="8" fill="#ffffff" stroke="#d7d1c4" stroke-width="2"/>
    <text x="220" y="323" fill="#171717" text-anchor="middle" font-size="22" font-weight="700">nexus-cli</text>
    <text x="220" y="352" fill="#5e5c56" text-anchor="middle" font-size="15">local auditable research workspace</text>

    <rect x="590" y="288" width="300" height="88" rx="8" fill="#ffffff" stroke="#d7d1c4" stroke-width="2"/>
    <text x="740" y="323" fill="#171717" text-anchor="middle" font-size="22" font-weight="700">nexus-web</text>
    <text x="740" y="352" fill="#5e5c56" text-anchor="middle" font-size="15">hosted Laravel/Inertia product shell</text>

    <rect x="330" y="366" width="300" height="78" rx="8" fill="#ffffff" stroke="#d7d1c4" stroke-width="2"/>
    <text x="480" y="397" fill="#171717" text-anchor="middle" font-size="21" font-weight="700">Citation Graph Layer</text>
    <text x="480" y="424" fill="#5e5c56" text-anchor="middle" font-size="15">graph-core and graph-algorithms</text>

    <rect x="148" y="76" width="304" height="78" rx="8" fill="#ffffff" stroke="#d7d1c4" stroke-width="2"/>
    <text x="300" y="108" fill="#171717" text-anchor="middle" font-size="21" font-weight="700">Scholarly Providers</text>
    <text x="300" y="134" fill="#5e5c56" text-anchor="middle" font-size="15">OpenAlex, Crossref, PubMed and more</text>

    <rect x="508" y="76" width="304" height="78" rx="8" fill="#ffffff" stroke="#d7d1c4" stroke-width="2"/>
    <text x="660" y="108" fill="#171717" text-anchor="middle" font-size="21" font-weight="700">RefManager</text>
    <text x="660" y="134" fill="#5e5c56" text-anchor="middle" font-size="15">RIS, BibTeX, CSL-JSON, EndNote XML</text>

    <rect x="290" y="466" width="380" height="88" rx="8" fill="#8f4a23"/>
    <text x="480" y="502" fill="#ffffff" text-anchor="middle" font-size="22" font-weight="700">Research Evidence</text>
    <text x="480" y="531" fill="#fff1e6" text-anchor="middle" font-size="15">runs, decisions, exports, benchmarks, public boundaries</text>
  </g>
  <g fill="#4a5d84">
    <circle cx="480" cy="190" r="5"/>
    <circle cx="220" cy="330" r="5"/>
    <circle cx="740" cy="330" r="5"/>
    <circle cx="480" cy="405" r="5"/>
    <circle cx="300" cy="115" r="5"/>
    <circle cx="660" cy="115" r="5"/>
    <circle cx="480" cy="510" r="5"/>
  </g>
</svg>

